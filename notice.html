
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notice Board</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #111317;
      color: white;
      display: flex;
      justify-content: center;
      padding: 50px 20px;
      flex-direction: column;
      align-items: center;
    }

    .header {
      width: 500px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .header h2 {
      color: #f9ac54;
      margin: 0;
    }

    .header button {
      padding: 5px 10px;
      border-radius: 5px;
      border: none;
      background-color: #f9ac54;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .header button:hover {
      background-color: #d79447;
      color: white;
    }

    .notice-container {
      width: 500px;
      background-color: #1f2125;
      padding: 20px 25px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
    }

    form {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    button[type="submit"] {
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      background-color: #f9ac54;
      color: #111317;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button[type="submit"]:hover {
      background-color: #d79447;
      color: white;
    }

    ul {
      list-style: none;
      padding-left: 0;
    }

    li {
      background-color: #35373b;
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    li button {
      background-color: transparent;
      color: #f9ac54;
      font-size: 16px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: 0.2s;
    }

    li button:hover {
      color: #d79447;
    }

    li input {
      flex: 1;
      background-color: #35373b;
      color: white;
      border: none;
      padding: 5px;
      border-radius: 5px;
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <h1 style="color: #f9ac54; margin-bottom: 20px;">Notice Board</h1>

  <!-- Header (logout visible for all, admin title only if admin) -->
  <div class="header">
    <h2 id="admin-title" style="display: none;">Admin Panel</h2>
    <button id="logout-btn">Logout</button>
  </div>

  <div class="notice-container">
    <!-- Admin form (hidden for members) -->
    <form id="notice-form" style="display: none;">
      <input type="text" id="notice-input" placeholder="Enter a notice" required />
      <button type="submit">Add</button>
    </form>

    <ul id="notice-list"></ul>
  </div>

  <script>
    const role = localStorage.getItem("role") || "user"; // "user" or "admin"
    const noticeForm = document.getElementById("notice-form");
    const noticeInput = document.getElementById("notice-input");
    const noticeList = document.getElementById("notice-list");
    const adminTitle = document.getElementById("admin-title");
    const logoutBtn = document.getElementById("logout-btn");

    const API_URL = "http://localhost:5000/api/notices"; // backend server

    // Show admin title and form only for admin
    if (role === "admin") {
      noticeForm.style.display = "flex";
      adminTitle.style.display = "block";
    }

    // Logout functionality
    logoutBtn.addEventListener("click", () => {
      localStorage.removeItem("role");
      window.location.href = "auth.html"; // redirect to login page
    });

    // Load notices from backend
    async function loadNotices() {
      try {
        const res = await fetch(API_URL);
        const notices = await res.json();
        renderNotices(notices);
      } catch (err) {
        console.error("Failed to load notices", err);
      }
    }

    // Admin: add notice (send to backend)
    noticeForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = noticeInput.value.trim();
      if (text) {
        await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title: text, desc: text, role })
        });
        noticeInput.value = "";
        loadNotices();
      }
    });

    // Render all notices
    function renderNotices(notices) {
      noticeList.innerHTML = "";
      notices.forEach((notice) => {
        const li = document.createElement("li");

        if (role === "admin") {
          // Editable input for admin
          const input = document.createElement("input");
          input.value = notice.title;
          li.appendChild(input);

          // Delete button
          const delBtn = document.createElement("button");
          delBtn.textContent = "✖";
          delBtn.onclick = async () => {
            await fetch(`${API_URL}/${notice._id}`, {
              method: "DELETE",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ role })
            });
            loadNotices();
          };
          li.appendChild(delBtn);
        } else {
          li.textContent = notice.title;
        }

        noticeList.appendChild(li);
      });
    }

    // Load notices when page opens
    loadNotices();
  </script>
</body>
</html>
